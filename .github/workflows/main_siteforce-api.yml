name: Build and deploy ASP.Net Core app to Azure Web App - siteforce-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
     id-token: write
     contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ./byte.api/byte.api.csproj

      - name: Build
        run: dotnet build ./byte.api/byte.api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./byte.api/byte.api.csproj --configuration Release --output ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_43064DEC68AD483F91DEB02DBE7DC321 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7848D14E7F944AAE84393FBA51057CA6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CE99D789DCE145D39C745442BDE05EB0 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'siteforce-api'
          package: ./publish